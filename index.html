<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Xroga · Crypto Pulse</title>
 <script src="https://unpkg.com/lucide@latest"></script>
 <style>
 /* ===== RESET ===== */
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }
 body {
 font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
 background: var(--bg);
 color: var(--text);
 transition: background 0.3s, color 0.3s;
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 }

 /* ===== THEME VARIABLES ===== */
 :root {
 --bg: #f4f6f9;
 --card-bg: #ffffff;
 --text: #111;
 --text-secondary: #555;
 --border: #d0d5dd;
 --accent: #2563eb;
 --accent-hover: #1d4ed8;
 --up: #16a34a;
 --down: #dc2626;
 --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
 }
 [data-theme="dark"] {
 --bg: #0f172a;
 --card-bg: #1e293b;
 --text: #f1f5f9;
 --text-secondary: #94a3b8;
 --border: #334155;
 --accent: #3b82f6;
 --accent-hover: #60a5fa;
 --up: #22c55e;
 --down: #ef4444;
 --shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
 }

 /* ===== LAYOUT ===== */
 header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 padding: 1rem 2rem;
 border-bottom: 1px solid var(--border);
 background: var(--card-bg);
 }
 header h1 {
 font-size: 1.4rem;
 font-weight: 600;
 display: flex;
 align-items: center;
 gap: 8px;
 }
 header h1 i {
 color: var(--accent);
 }

 #theme-toggle {
 background: transparent;
 border: 1px solid var(--border);
 color: var(--text);
 padding: 6px 12px;
 border-radius: 8px;
 cursor: pointer;
 display: inline-flex;
 align-items: center;
 gap: 6px;
 font-size: 0.9rem;
 transition: 0.2s;
 }
 #theme-toggle:hover {
 background: var(--accent);
 color: #fff;
 border-color: var(--accent);
 }

 main {
 flex: 1;
 max-width: 960px;
 margin: 0 auto;
 padding: 2rem 1.5rem;
 width: 100%;
 }

 /* ===== KPI ===== */
 .kpi {
 background: var(--card-bg);
 border: 1px solid var(--border);
 border-radius: 12px;
 padding: 1.5rem 2rem;
 margin-bottom: 2rem;
 display: flex;
 align-items: center;
 gap: 1rem;
 box-shadow: var(--shadow);
 }
 .kpi i {
 color: var(--accent);
 flex-shrink: 0;
 }
 .kpi span {
 font-size: 0.9rem;
 color: var(--text-secondary);
 }
 .kpi strong {
 font-size: 1.8rem;
 font-weight: 700;
 letter-spacing: -0.02em;
 }

 /* ===== TABLE ===== */
 .table-wrap {
 background: var(--card-bg);
 border: 1px solid var(--border);
 border-radius: 12px;
 overflow: hidden;
 box-shadow: var(--shadow);
 }
 table {
 width: 100%;
 border-collapse: collapse;
 }
 th {
 text-align: left;
 padding: 0.9rem 1.2rem;
 font-weight: 600;
 font-size: 0.85rem;
 text-transform: uppercase;
 letter-spacing: 0.04em;
 color: var(--text-secondary);
 border-bottom: 1px solid var(--border);
 background: var(--card-bg);
 }
 td {
 padding: 1rem 1.2rem;
 border-bottom: 1px solid var(--border);
 transition: background 0.2s;
 }
 tr:last-child td {
 border-bottom: none;
 }
 tr:hover td {
 background: color-mix(in srgb, var(--accent) 6%, transparent);
 }

 .up {
 color: var(--up);
 font-weight: 600;
 }
 .down {
 color: var(--down);
 font-weight: 600;
 }

 /* ===== FOOTER ===== */
 footer {
 text-align: center;
 padding: 1.5rem;
 font-size: 0.8rem;
 color: var(--text-secondary);
 border-top: 1px solid var(--border);
 margin-top: auto;
 }

 /* ===== RESPONSIVE ===== */
 @media (max-width: 600px) {
 header {
 padding: 0.8rem 1rem;
 flex-wrap: wrap;
 gap: 0.5rem;
 }
 header h1 {
 font-size: 1.1rem;
 }
 main {
 padding: 1.2rem 0.8rem;
 }
 .kpi {
 padding: 1.2rem;
 flex-wrap: wrap;
 }
 .kpi strong {
 font-size: 1.4rem;
 }
 th,
 td {
 padding: 0.7rem 0.8rem;
 font-size: 0.9rem;
 }
 }
 </style>
</head>
<body>

 <!-- ===== HEADER ===== -->
 <header>
 <h1>
 <i data-lucide="activity" width="24" height="24"></i>
 Crypto Pulse
 </h1>
 <button id="theme-toggle" title="Toggle day/night">
 <i data-lucide="moon" width="18" height="18"></i>
 </button>
 </header>

 <!-- ===== MAIN ===== -->
 <main>
 <!-- KPI: Bitcoin price -->
 <div class="kpi">
 <i data-lucide="bitcoin" width="36" height="36"></i>
 <div>
 <span>Bitcoin · BTC</span><br />
 <strong id="btc-kpi">$ --</strong>
 </div>
 </div>

 <!-- Markets table -->
 <div class="table-wrap">
 <table id="markets">
 <thead>
 <tr>
 <th>Asset</th>
 <th>Price (USD)</th>
 <th>24h Change</th>
 </tr>
 </thead>
 <tbody id="crypto-tbody">
 <!-- Populated by JS -->
 <tr><td colspan="3" style="text-align:center;color:var(--text-secondary);">Loading…</td></tr>
 </tbody>
 </table>
 </div>
 </main>

 <!-- ===== FOOTER ===== -->
 <footer>
 Live prices via CoinGecko (free) &bull; No API key required
 </footer>

 <!-- ===== JAVASCRIPT ===== -->
 <script>
 (function () {
 'use strict';

 /* ---------- CoinGecko free prices ---------- */
 async function fetchPrices() {
 const ids = ['bitcoin', 'ethereum', 'solana', 'arbitrum'];
 const url =
 'https://api.coingecko.com/api/v3/simple/price?ids=' +
 ids.join(',') +
 '&vs_currencies=usd&include_24hr_change=true';
 const res = await fetch(url);
 if (!res.ok) throw new Error('CoinGecko ' + res.status);
 return res.json();
 }

 async function renderDashboard() {
 try {
 const data = await fetchPrices();
 const map = {
 bitcoin: { ticker: 'BTC', name: 'Bitcoin' },
 ethereum: { ticker: 'ETH', name: 'Ethereum' },
 solana: { ticker: 'SOL', name: 'Solana' },
 arbitrum: { ticker: 'ARB', name: 'Arbitrum' },
 };

 // Update KPI
 const kpiEl = document.getElementById('btc-kpi');
 if (kpiEl && data.bitcoin?.usd != null) {
 kpiEl.textContent = '$' + Number(data.bitcoin.usd).toLocaleString(undefined, {
 maximumFractionDigits: 0,
 });
 }

 // Update table
 const tbody = document.getElementById('crypto-tbody');
 if (tbody) {
 let html = '';
 for (const [id, info] of Object.entries(map)) {
 const row = data[id];
 if (!row) continue;
 const price = Number(row.usd);
 const change = Number(row.usd_24h_change || 0);
 const cls = change >= 0 ? 'up' : 'down';
 const sign = change >= 0 ? '+' : '';
 html +=
 '<tr>' +
 '<td><strong>' + info.ticker + '</strong> <span style="color:var(--text-secondary);font-size:0.85rem;">' +
 info.name + '</span></td>' +
 '<td>$' + price.toLocaleString(undefined, { maximumFractionDigits: 2 }) + '</td>' +
 '<td class="' + cls + '">' + sign + change.toFixed(2) + '%</td>' +
 '</tr>';
 }
 tbody.innerHTML = html || '<tr><td colspan="3" style="text-align:center;color:var(--text-secondary);">No data</td></tr>';
 }
 } catch (err) {
 console.warn('[Crypto]', err);
 const tbody = document.getElementById('crypto-tbody');
 if (tbody) {
 tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--down);">Failed to load prices</td></tr>';
 }
 }
 }

 /* ---------- Theme toggle ---------- */
 function initTheme() {
 const html = document.documentElement;
 const btn = document.getElementById('theme-toggle');
 if (!btn) return;

 function setTheme(mode) {
 html.setAttribute('data-theme', mode);
 localStorage.setItem('theme', mode);
 const icon = btn.querySelector('i');
 if (icon) {
 icon.setAttribute('data-lucide', mode === 'dark' ? 'moon' : 'sun');
 if (window.lucide) {
 lucide.createIcons();
 }
 }
 }

 function getPreferred() {
 const stored = localStorage.getItem('theme');
 if (stored === 'light' || stored === 'dark') return stored;
 return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
 }

 setTheme(getPreferred());

 btn.addEventListener('click', function () {
 const current = html.getAttribute('data-theme');
 setTheme(current === 'dark' ? 'light' : 'dark');
 });

 window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function (e) {
 if (!localStorage.getItem('theme')) {
 setTheme(e.matches ? 'light' : 'dark');
 }
 });
 }

 /* ---------- Boot ---------- */
 // Wait for Lucide to be ready, then render
 function boot() {
 initTheme();
 renderDashboard();
 // Re-run icons after any dynamic content
 if (window.lucide) lucide.createIcons();
 }

 if (document.readyState === 'loading') {
 document.addEventListener('DOMContentLoaded', boot);
 } else {
 boot();
 }
 })();
 </script>

</body>
</html>
